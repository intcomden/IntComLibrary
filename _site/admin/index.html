<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin • Red Alcoholic Archive</title>

  <!-- Firebase Compat SDKs (v10.8.0) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-primary: #0c0d10;
      --bg-secondary: #13151c;
      --bg-tertiary: #191c26;
      --accent-red: #d63031;
      --accent-red-hover: #ff4d4d;
      --accent-red-muted: #8b1e1f;
      --accent-gold: #e5c158;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --border-color: rgba(214, 48, 49, 0.15);
      --border-color-focus: rgba(214, 48, 49, 0.4);
      --font-display: 'Cinzel', serif;
      --font-sans: 'Inter', sans-serif;
      --transition: all 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: var(--font-sans);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    h1, h2, h3 {
      font-family: var(--font-display);
      color: #ffffff;
      margin-bottom: 1.5rem;
    }

    .brand-logo svg {
      width: 60px;
      height: 60px;
      margin: 0 auto 1.5rem auto;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 1.25rem;
      background: var(--bg-primary);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: var(--font-sans);
      transition: var(--transition);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--border-color-focus);
      box-shadow: 0 0 0 3px rgba(214, 48, 49, 0.1);
    }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    button {
      padding: 12px 24px;
      background: var(--accent-red);
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
    }

    button:hover {
      background: var(--accent-red-hover);
    }

    button.secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      margin-left: 0.5rem;
    }

    button.secondary:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    button.danger {
      background: #7f1d1d;
    }

    button.danger:hover {
      background: #991b1b;
    }

    .hidden { display: none !important; }

    /* Alert Banners */
    .status {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status.info { background: rgba(96, 165, 250, 0.1); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.2); }
    .status.success { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
    .status.error { background: rgba(248, 113, 113, 0.1); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.2); }

    /* Tabs & Content Split */
    .admin-nav {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .nav-tab {
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      cursor: pointer;
    }

    .nav-tab.active {
      color: var(--accent-gold);
      border-bottom-color: var(--accent-gold);
    }

    /* Table / Lists */
    .item-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    .list-item {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .item-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .item-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .item-actions button {
      padding: 6px 12px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 80px; height: 80px; margin: 0 auto 1.5rem auto; display: block;">
        <!-- Defs for reuse -->
        <defs>
          <g id="admin-grain">
            <path d="M 0,0 C -1.8,-3 -2.5,-7 0,-10 C 2.5,-7 1.8,-3 0,0 Z" fill="#e5c158" stroke="#0c0d10" stroke-width="0.6"/>
            <path d="M 0,-2 V -8" stroke="#0c0d10" stroke-width="0.5"/>
          </g>
          <g id="admin-wheat-pair">
            <use href="#admin-grain" transform="rotate(-28) scale(0.95)" />
            <use href="#admin-grain" transform="rotate(28) scale(0.95)" />
            <path d="M 0,0 V -12" stroke="#e5c158" stroke-width="1.2" stroke-linecap="round"/>
          </g>
          <g id="admin-wreath-half">
            <path d="M 50,86 C 26,86 13,67 15,48 C 17,32 28,19 46,14" stroke="#e5c158" stroke-width="2" fill="none" stroke-linecap="round"/>
            <use href="#admin-wheat-pair" transform="translate(48, 85) rotate(100)" />
            <use href="#admin-wheat-pair" transform="translate(39, 83) rotate(120)" />
            <use href="#admin-wheat-pair" transform="translate(30, 78) rotate(140)" />
            <use href="#admin-wheat-pair" transform="translate(22, 70) rotate(160)" />
            <use href="#admin-wheat-pair" transform="translate(17, 60) rotate(180)" />
            <use href="#admin-wheat-pair" transform="translate(16, 49) rotate(200)" />
            <use href="#admin-wheat-pair" transform="translate(19, 38) rotate(220)" />
            <use href="#admin-wheat-pair" transform="translate(25, 28) rotate(240)" />
            <use href="#admin-wheat-pair" transform="translate(34, 21) rotate(260)" />
            <use href="#admin-wheat-pair" transform="translate(44, 16) rotate(280)" />
          </g>
        </defs>

        <use href="#admin-wreath-half" />
        <use href="#admin-wreath-half" transform="translate(100, 0) scale(-1, 1)" />

        <g transform="translate(50, 85)" fill="#e5c158" stroke="#0c0d10" stroke-width="0.8">
          <circle cx="0" cy="0" r="3" />
          <path d="M 0,0 C -8,-6 -12,-2 -5,2 Z" />
          <path d="M 0,0 C 8,-6 12,-2 5,2 Z" />
          <path d="M -2,2 C -5,7 -8,10 -8,10" stroke="#e5c158" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M 2,2 C 5,7 8,10 8,10" stroke="#e5c158" stroke-width="1.5" stroke-linecap="round"/>
        </g>

        <g transform="translate(50, 48) scale(0.68)">
          <path d="M -28,19 C -19,19 -9,11 0,11 C 9,11 19,19 28,19 V -19 C 19,-19 9,-27 0,-27 C -9,-27 -19,-19 -28,-19 Z" fill="#9e791b" stroke="#0c0d10" stroke-width="0.8"/>
          <path d="M -26,17 C -18,17 -8,9 0,9 C 8,9 18,17 26,17 V -21 C 18,-21 8,-29 0,-29 C -8,-29 -18,-21 -26,-21 Z" fill="#c99e2b" stroke="#0c0d10" stroke-width="0.8"/>
          <path d="M -24,14 C -16,14 -6,6 0,6 V -24 C -6,-24 -16,-16 -24,-16 Z" fill="#e5c158" stroke="#0c0d10" stroke-width="0.8"/>
          <path d="M 24,14 C 16,14 6,6 0,6 V -24 C 6,-24 16,-16 24,-16 Z" fill="#e5c158" stroke="#0c0d10" stroke-width="0.8"/>
          <path d="M 0,6 V -24" stroke="#0c0d10" stroke-width="0.8"/>
        </g>
      </svg>
    </div>

    <!-- Login screen -->
    <div id="login-screen">
      <h1 style="text-align: center;">Moderator Access</h1>
      <div id="login-status" class="status error hidden"></div>
      <input type="email" id="mod-email" placeholder="Email Address">
      <input type="password" id="mod-password" placeholder="Password">
      <button onclick="modLogin()" style="width: 100%;">Sign In</button>
      <div style="text-align: center; margin-top: 1.5rem;">
        <span style="font-size: 0.85rem; color: var(--text-muted);">Need access?</span>
        <a href="javascript:void(0)" onclick="showCreateAccount()" style="font-size: 0.85rem; color: var(--accent-gold); text-decoration: none; font-weight: 600; margin-left: 0.25rem;">Create Account</a>
      </div>
    </div>

    <!-- Create Account screen -->
    <div id="create-account-screen" class="hidden">
      <h1 style="text-align: center;">Create Moderator Account</h1>
      <div id="create-status" class="status error hidden"></div>
      <input type="email" id="new-email" placeholder="Email Address">
      <input type="password" id="new-password" placeholder="Password (min 6 chars)">
      <input type="password" id="confirm-password" placeholder="Confirm Password">
      <button onclick="createAccount()" style="width: 100%;">Register Account</button>
      <div style="text-align: center; margin-top: 1.5rem;">
        <span style="font-size: 0.85rem; color: var(--text-muted);">Already have an account?</span>
        <a href="javascript:void(0)" onclick="showLogin()" style="font-size: 0.85rem; color: var(--accent-gold); text-decoration: none; font-weight: 600; margin-left: 0.25rem;">Sign In</a>
      </div>
    </div>

    <!-- PAT connection screen removed -->

    <!-- Main Dashboard UI -->
    <div id="dashboard" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1>Admin Control Room</h1>
        <button class="secondary" onclick="logOut()" style="padding: 6px 12px; font-size: 0.8rem;">Disconnect</button>
      </div>

      <!-- Alert Bar -->
      <div id="status" class="status info hidden"></div>

      <!-- Navigation Tabs -->
      <div class="admin-nav">
        <button class="nav-tab active" id="tab-btn-publish" onclick="switchTab('publish')">📤 Publish Text</button>
        <button class="nav-tab" id="tab-btn-manage" onclick="switchTab('manage')">📁 Manage Texts</button>
        <button class="nav-tab" id="tab-btn-sections" onclick="switchTab('sections')">📂 Manage Sections</button>
      </div>

      <!-- Tab 1: Publish Form -->
      <div id="tab-publish">
        <h2 id="form-action-title">Upload New Document</h2>
        <div style="margin-top: 1rem;">
          <input type="hidden" id="edit-sha">
          <input type="hidden" id="edit-path">

          <label for="language">Language</label>
          <select id="language">
            <option value="en">English</option>
            <option value="pt">Português</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="nl">Nederlands</option>
            <option value="de">Deutsch</option>
            <option value="el">Ελληνικά</option>
          </select>

          <label for="title">Title</label>
          <input type="text" id="title" placeholder="e.g. Wage Labour and Capital">

          <label for="author">Author</label>
          <input type="text" id="author" placeholder="e.g. Karl Marx">

          <label for="description">Short Commentary / Description</label>
          <textarea id="description" placeholder="Provide background context or commentary about this text..." rows="4"></textarea>

          <label for="pdf" id="pdf-file-label">PDF File upload</label>
          <input type="file" id="pdf" accept=".pdf">
          <p id="pdf-edit-helper" style="font-size: 0.8rem; color: var(--text-muted); margin-top: -10px; margin-bottom: 20px;" class="hidden">
            Leave file blank if you do not want to replace the existing PDF file.
          </p>

          <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <button id="submit-btn" onclick="uploadText()" style="flex: 1;">Publish Entry</button>
            <button id="cancel-edit-btn" class="secondary hidden" onclick="resetForm()">Cancel Edit</button>
          </div>
        </div>
      </div>

      <!-- Tab 2: Manage Texts -->
      <div id="tab-manage" class="hidden">
        <h2>Archive Content Management</h2>
        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
          <input type="text" id="manage-search" placeholder="Filter texts by title, author, or language..." style="margin-bottom: 0; flex: 1;">
          <button class="secondary" onclick="loadExistingTexts()">🔄 Refresh</button>
        </div>
        <div class="item-list" id="texts-list">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- Tab 3: Manage Sections -->
      <div id="tab-sections" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2>Archive Sections</h2>
          <button onclick="createNewSection()">➕ Create New Section</button>
        </div>
        
        <!-- Section Form Container (initially hidden) -->
        <div id="section-form-container" class="hidden" style="background: var(--bg-primary); border: 1px solid var(--border-color); padding: 20px; border-radius: 4px; margin-bottom: 2rem;">
          <h3 id="section-form-title">Create New Section</h3>
          
          <input type="hidden" id="edit-section-sha">
          <input type="hidden" id="edit-section-path">
          
          <label for="section-language">Language</label>
          <select id="section-language">
            <option value="en">English</option>
            <option value="pt">Português</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="nl">Nederlands</option>
            <option value="de">Deutsch</option>
            <option value="el">Ελληνικά</option>
          </select>
          
          <label for="section-title">Section Title</label>
          <input type="text" id="section-title" placeholder="e.g. Critique of Political Economy">
          
          <label for="section-slug">Slug (URL identifier)</label>
          <input type="text" id="section-slug" placeholder="e.g. critique-political-economy">
          
          <label for="section-order">Display Order</label>
          <input type="number" id="section-order" value="10" placeholder="e.g. 10">
          
          <label for="section-content">Section Texts List (Markdown list of texts/audiobooks)</label>
          <textarea id="section-content" placeholder="- Book Title - Author + Link..." rows="6"></textarea>
          
          <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <button id="section-submit-btn" onclick="saveSection()">Save Section</button>
            <button class="secondary" onclick="resetSectionForm()">Cancel</button>
          </div>
        </div>

        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
          <input type="text" id="sections-search" placeholder="Filter sections by title or language..." style="margin-bottom: 0; flex: 1;">
          <button class="secondary" onclick="loadExistingSections()">🔄 Refresh</button>
        </div>
        <div class="item-list" id="sections-list">
          <!-- Dynamically populated -->
        </div>
      </div>
    </div>
  </div>

  <script>
    window.firebaseReady = false;
    let existingFiles = []; // Cache list of texts
    let existingSections = []; // Cache list of sections

    // Initialize Firebase dynamically from config
    (async function() {
      try {
        const configRes = await fetch('../assets/js/firebase-config.json');
        const firebaseConfig = await configRes.json();
        firebase.initializeApp(firebaseConfig);
        window.db = firebase.firestore();
        window.storage = firebase.storage();
        // Set retry times to 5 seconds to fail fast and display configuration/CORS errors
        window.storage.setMaxUploadRetryTime(5000);
        window.storage.setMaxOperationRetryTime(5000);
        window.auth = firebase.auth();
        window.firebaseReady = true;
        window.dispatchEvent(new Event('firebase-ready'));
      } catch (e) {
        console.error("Firebase failed to load in admin:", e);
        showStatus("❌ Failed to initialize Firebase. Please check assets/js/firebase-config.json", "red");
      }
    })();

    // Listen to Firebase auth state
    function initAuthObserver() {
      auth.onAuthStateChanged(user => {
        if (user) {
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('create-account-screen').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
          loadExistingTexts();
        } else {
          document.getElementById('dashboard').classList.add('hidden');
          document.getElementById('create-account-screen').classList.add('hidden');
          document.getElementById('login-screen').classList.remove('hidden');
        }
      });
    }
    
    window.addEventListener('firebase-ready', initAuthObserver);

    // Authentication Actions
    function modLogin() {
      const email = document.getElementById('mod-email').value.trim();
      const pass = document.getElementById('mod-password').value;
      const status = document.getElementById('login-status');
      
      if (!email || !pass) {
        status.innerHTML = "❌ Email and password are required";
        status.classList.remove('hidden');
        return;
      }
      
      status.innerHTML = "Signing in...";
      status.className = "status info";
      status.classList.remove('hidden');
      
      auth.signInWithEmailAndPassword(email, pass)
        .then(() => {
          status.classList.add('hidden');
        })
        .catch(err => {
          status.innerHTML = `❌ Login failed: ${err.message}`;
          status.className = "status error";
          status.classList.remove('hidden');
        });
    }

    function showCreateAccount() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('create-account-screen').classList.remove('hidden');
      document.getElementById('create-status').classList.add('hidden');
    }

    function showLogin() {
      document.getElementById('create-account-screen').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('login-status').classList.add('hidden');
    }

    function createAccount() {
      const email = document.getElementById('new-email').value.trim();
      const pass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;
      const status = document.getElementById('create-status');

      if (!email || !pass || !confirmPass) {
        status.innerHTML = "❌ All fields are required";
        status.className = "status error";
        status.classList.remove('hidden');
        return;
      }

      if (pass.length < 6) {
        status.innerHTML = "❌ Password must be at least 6 characters";
        status.className = "status error";
        status.classList.remove('hidden');
        return;
      }

      if (pass !== confirmPass) {
        status.innerHTML = "❌ Passwords do not match";
        status.className = "status error";
        status.classList.remove('hidden');
        return;
      }

      status.innerHTML = "Registering account...";
      status.className = "status info";
      status.classList.remove('hidden');

      auth.createUserWithEmailAndPassword(email, pass)
        .then(() => {
          status.innerHTML = "🎉 Account created successfully!";
          status.className = "status success";
          status.classList.remove('hidden');
          setTimeout(() => {
            status.classList.add('hidden');
          }, 1000);
        })
        .catch(err => {
          status.innerHTML = `❌ Registration failed: ${err.message}`;
          status.className = "status error";
          status.classList.remove('hidden');
        });
    }

    function logOut() {
      auth.signOut();
    }

    // Navigation Tabs
    function switchTab(tab) {
      document.getElementById('tab-publish').classList.add('hidden');
      document.getElementById('tab-manage').classList.add('hidden');
      document.getElementById('tab-sections').classList.add('hidden');
      
      document.getElementById('tab-btn-publish').classList.remove('active');
      document.getElementById('tab-btn-manage').classList.remove('active');
      document.getElementById('tab-btn-sections').classList.remove('active');
      
      if (tab === 'publish') {
        document.getElementById('tab-publish').classList.remove('hidden');
        document.getElementById('tab-btn-publish').classList.add('active');
      } else if (tab === 'manage') {
        document.getElementById('tab-manage').classList.remove('hidden');
        document.getElementById('tab-btn-manage').classList.add('active');
        loadExistingTexts();
      } else if (tab === 'sections') {
        document.getElementById('tab-sections').classList.remove('hidden');
        document.getElementById('tab-btn-sections').classList.add('active');
        loadExistingSections();
      }
    }

    // CRUD: Texts
    function loadExistingTexts() {
      const listContainer = document.getElementById('texts-list');
      listContainer.innerHTML = "<p style='color: var(--text-muted);'>Loading library entries...</p>";

      db.collection("texts").get()
        .then(snapshot => {
          const items = [];
          snapshot.forEach(doc => {
            items.push({ id: doc.id, ...doc.data() });
          });

          items.sort((a, b) => a.title.localeCompare(b.title));
          existingFiles = items;

          renderList(items);

          const searchInput = document.getElementById('manage-search');
          searchInput.removeEventListener('input', filterTextsHandler);
          searchInput.addEventListener('input', (e) => filterTextsHandler(e, items));
        })
        .catch(err => {
          listContainer.innerHTML = `<p style='color: #f87171;'>Error loading entries: ${err.message}</p>`;
        });
    }

    function filterTextsHandler(e, items) {
      const query = e.target.value.toLowerCase().trim();
      const filtered = items.filter(i => 
        i.title.toLowerCase().includes(query) || 
        (i.author && i.author.toLowerCase().includes(query)) ||
        i.language.toLowerCase().includes(query)
      );
      renderList(filtered);
    }

    function renderList(items) {
      const listContainer = document.getElementById('texts-list');
      listContainer.innerHTML = "";

      if (items.length === 0) {
        listContainer.innerHTML = "<p style='color: var(--text-muted);'>No archive texts found.</p>";
        return;
      }

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'list-item';
        
        let langFlag = "🇬🇧";
        if (item.language === 'pt') langFlag = "🇧🇷";
        if (item.language === 'es') langFlag = "🇪🇸";
        if (item.language === 'it') langFlag = "🇮🇹";
        if (item.language === 'nl') langFlag = "🇳🇱";
        if (item.language === 'de') langFlag = "🇩🇪";
        if (item.language === 'el') langFlag = "🇬🇷";

        div.innerHTML = `
          <div class="item-info">
            <span class="item-title">${escapeHtml(item.title)}</span>
            <span class="item-meta">${escapeHtml(item.author || 'Unknown')} • ${langFlag} ${item.language.toUpperCase()} • ${escapeHtml(item.pdfName || 'No PDF')}</span>
          </div>
          <div class="item-actions">
            <button onclick="editEntry('${item.id}')">Edit</button>
            <button class="danger" onclick="deleteEntry('${item.id}', '${escapeHtml(item.title)}')">Delete</button>
          </div>
        `;
        listContainer.appendChild(div);
      });
    }

    async function uploadText() {
      const title = document.getElementById('title').value.trim();
      const author = document.getElementById('author').value.trim() || "Unknown";
      const description = document.getElementById('description').value.trim();
      const language = document.getElementById('language').value;
      const file = document.getElementById('pdf').files[0];
      const docId = document.getElementById('edit-sha').value;

      if (!title) return showStatus("❌ Please specify a title", "red");
      if (!docId && !file) return showStatus("❌ Please select a PDF file to upload", "red");

      showStatus("Publishing entry...", "blue");

      try {
        let pdfFilename = "";
        let pdfUrl = "";

        if (file) {
          pdfFilename = file.name.toLowerCase().replace(/[^a-z0-9.-]/g, '-');
          showStatus("Uploading PDF file to Firebase Storage...", "blue");
          
          const storageRef = storage.ref('uploads/' + pdfFilename);
          await storageRef.put(file);
          pdfUrl = await storageRef.getDownloadURL();
        }

        const dataObj = {
          title: title,
          author: author,
          language: language,
          description: description
        };

        if (file) {
          dataObj.pdfName = pdfFilename;
          dataObj.pdfUrl = pdfUrl;
        }

        if (docId) {
          showStatus("Updating Firestore document...", "blue");
          await db.collection("texts").doc(docId).update(dataObj);
          showStatus(`✅ Successfully updated "${title}"!`, "green");
        } else {
          showStatus("Creating Firestore document...", "blue");
          dataObj.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection("texts").add(dataObj);
          showStatus(`✅ Successfully published "${title}"!`, "green");
        }
        
        resetForm();
      } catch (err) {
        showStatus(`❌ Publish failed: ${err.message}`, "red");
      }
    }

    async function deleteEntry(id, title) {
      if (!confirm(`Are you sure you want to permanently delete the entry "${title}"?`)) return;

      showStatus(`Deleting "${title}"...`, "blue");

      try {
        await db.collection("texts").doc(id).delete();
        showStatus(`✅ Successfully deleted "${title}"`, "green");
        loadExistingTexts();
      } catch (err) {
        showStatus(`❌ Delete failed: ${err.message}`, "red");
      }
    }

    function editEntry(id) {
      const item = existingFiles.find(f => f.id === id);
      if (!item) return;

      document.getElementById('edit-sha').value = item.id;
      document.getElementById('language').value = item.language;
      document.getElementById('title').value = item.title;
      document.getElementById('author').value = item.author || '';
      document.getElementById('description').value = item.description || '';

      document.getElementById('form-action-title').innerText = "Edit Document Entry";
      document.getElementById('submit-btn').innerText = "Save Changes";
      document.getElementById('cancel-edit-btn').classList.remove('hidden');
      document.getElementById('pdf-edit-helper').classList.remove('hidden');
      document.getElementById('pdf-file-label').innerText = "PDF File upload (Optional)";
      
      showStatus("", "blue");
      switchTab('publish');
    }

    function resetForm() {
      document.getElementById('edit-sha').value = "";
      document.getElementById('language').value = "en";
      document.getElementById('title').value = "";
      document.getElementById('author').value = "";
      document.getElementById('description').value = "";
      document.getElementById('pdf').value = "";

      document.getElementById('form-action-title').innerText = "Upload New Document";
      document.getElementById('submit-btn').innerText = "Publish Entry";
      document.getElementById('cancel-edit-btn').classList.add('hidden');
      document.getElementById('pdf-edit-helper').classList.add('hidden');
      document.getElementById('pdf-file-label').innerText = "PDF File upload";
      
      showStatus("", "blue");
    }

    function showStatus(msg, color) {
      const status = document.getElementById('status');
      status.classList.remove('hidden');
      status.innerHTML = msg;

      if (color === "green") {
        status.className = "status success";
      } else if (color === "red") {
        status.className = "status error";
      } else {
        status.className = "status info";
      }
    }

    // CRUD: Sections
    function loadExistingSections() {
      const listContainer = document.getElementById('sections-list');
      listContainer.innerHTML = "<p style='color: var(--text-muted);'>Loading sections...</p>";

      db.collection("sections").get()
        .then(snapshot => {
          const items = [];
          snapshot.forEach(doc => {
            items.push({ id: doc.id, ...doc.data() });
          });

          items.sort((a, b) => {
            const orderA = parseInt(a.order) || 100;
            const orderB = parseInt(b.order) || 100;
            if (orderA !== orderB) return orderA - orderB;
            return a.title.localeCompare(b.title);
          });
          existingSections = items;

          renderSectionsList(items);

          const searchInput = document.getElementById('sections-search');
          searchInput.removeEventListener('input', filterSectionsHandler);
          searchInput.addEventListener('input', (e) => filterSectionsHandler(e, items));
        })
        .catch(err => {
          listContainer.innerHTML = `<p style='color: #f87171;'>Error loading sections: ${err.message}</p>`;
        });
    }

    function filterSectionsHandler(e, items) {
      const query = e.target.value.toLowerCase().trim();
      const filtered = items.filter(i => 
        i.title.toLowerCase().includes(query) || 
        i.language.toLowerCase().includes(query)
      );
      renderSectionsList(filtered);
    }

    function renderSectionsList(items) {
      const listContainer = document.getElementById('sections-list');
      listContainer.innerHTML = "";

      if (items.length === 0) {
        listContainer.innerHTML = "<p style='color: var(--text-muted);'>No sections found.</p>";
        return;
      }

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'list-item';
        
        let langFlag = "🇬🇧";
        if (item.language === 'pt') langFlag = "🇧🇷";
        if (item.language === 'es') langFlag = "🇪🇸";
        if (item.language === 'it') langFlag = "🇮🇹";
        if (item.language === 'nl') langFlag = "🇳🇱";
        if (item.language === 'de') langFlag = "🇩🇪";
        if (item.language === 'el') langFlag = "🇬🇷";

        div.innerHTML = `
          <div class="item-info">
            <span class="item-title">${escapeHtml(item.title)}</span>
            <span class="item-meta">${langFlag} ${item.language.toUpperCase()} • Slug: ${escapeHtml(item.slug)} • Order: ${item.order}</span>
          </div>
          <div class="item-actions">
            <button onclick="editSection('${item.id}')">Edit</button>
            <button class="danger" onclick="deleteSection('${item.id}', '${escapeHtml(item.title)}')">Delete</button>
          </div>
        `;
        listContainer.appendChild(div);
      });
    }

    function createNewSection() {
      resetSectionForm();
      document.getElementById('section-form-container').classList.remove('hidden');
      document.getElementById('section-form-title').innerText = "Create New Section";
    }

    function resetSectionForm() {
      document.getElementById('edit-section-sha').value = "";
      document.getElementById('section-language').value = "en";
      document.getElementById('section-title').value = "";
      document.getElementById('section-slug').value = "";
      document.getElementById('section-order').value = "10";
      document.getElementById('section-content').value = "";
      document.getElementById('section-form-container').classList.add('hidden');
    }

    function editSection(id) {
      const item = existingSections.find(s => s.id === id);
      if (!item) return;

      document.getElementById('edit-section-sha').value = item.id;
      document.getElementById('section-language').value = item.language;
      document.getElementById('section-title').value = item.title;
      document.getElementById('section-slug').value = item.slug;
      document.getElementById('section-order').value = item.order;
      document.getElementById('section-content').value = item.content || '';

      document.getElementById('section-form-container').classList.remove('hidden');
      document.getElementById('section-form-title').innerText = "Edit Section";
      document.getElementById('section-form-container').scrollIntoView({ behavior: 'smooth' });
    }

    async function saveSection() {
      const title = document.getElementById('section-title').value.trim();
      const language = document.getElementById('section-language').value;
      const slug = document.getElementById('section-slug').value.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const order = document.getElementById('section-order').value || "10";
      const content = document.getElementById('section-content').value.trim();
      const docId = document.getElementById('edit-section-sha').value;

      if (!title) return alert("Please specify a section title");
      if (!slug) return alert("Please specify a slug");

      showStatus("Saving section...", "blue");

      try {
        const docName = `${language}-${slug}`;
        const dataObj = {
          title: title,
          language: language,
          slug: slug,
          order: parseInt(order),
          content: content
        };

        if (docId && docId !== docName) {
          showStatus("Removing old section path...", "blue");
          await db.collection("sections").doc(docId).delete();
        }

        showStatus("Saving section document to Firestore...", "blue");
        await db.collection("sections").doc(docName).set(dataObj);

        showStatus(`✅ Successfully saved section "${title}"!`, "green");
        resetSectionForm();
        loadExistingSections();
      } catch (err) {
        showStatus(`❌ Save failed: ${err.message}`, "red");
      }
    }

    async function deleteSection(id, title) {
      if (!confirm(`Are you sure you want to permanently delete the section "${title}"?`)) return;

      showStatus("Deleting section...", "blue");

      try {
        await db.collection("sections").doc(id).delete();
        showStatus(`✅ Successfully deleted section "${title}"`, "green");
        loadExistingSections();
      } catch (err) {
        showStatus(`❌ Delete failed: ${err.message}`, "red");
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
