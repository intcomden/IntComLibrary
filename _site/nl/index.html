<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internationalist Communist Library • Internationalist Communist Library</title>
  
  <link rel="icon" type="image/png" href="/internationalist-library/favicon.png">

  <!-- Support for custom search, cards, and admin dashboard styling -->
  <link rel="stylesheet" href="/internationalist-library/assets/css/style.css">

  <!-- Cleaned-up style overrides provided by the user -->
  <style>
    :root {
      --bg: #0c0d10;
      --card: #14161d;
      --red: #e63939;
      --gold: #e5c158;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg) !important;
      color: var(--text) !important;
      line-height: 1.7;
    }
    .header {
      background: #1a1c24 !important;
      padding: 1.5rem !important;
      text-align: center !important;
      border-bottom: 3px solid var(--red) !important;
      height: auto !important;
      display: block !important;
    }
    .logo {
      font-size: 2.2rem !important;
      font-weight: bold !important;
      color: var(--red) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 12px !important;
    }
    .container {
      max-width: 1100px !important;
      margin: 2rem auto !important;
      padding: 0 1.5rem !important;
    }
    .card {
      background: var(--card) !important;
      border-left: 5px solid var(--red) !important;
      padding: 1.5rem !important;
      margin-bottom: 1.5rem !important;
      border-radius: 4px !important;
    }
    h1, h2 { color: var(--red) !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="/internationalist-library/assets/logo.svg" alt="☭" style="height: 48px; width: 48px; vertical-align: middle;">
      Internationalist Communist Library
    </div>
  </div>

  <div class="container">
    <div style="margin-bottom: 2.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem;">
  <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; font-family: var(--font-serif);">☭ Theoretisch Archief</h2>
  <p style="color: var(--text-muted); font-size: 1rem;">
    Krijg toegang tot belangrijke theoretische teksten, stellingen en historische manifesten uit de linkse communistische, internationalistische en raadcommunistische tradities.
  </p>
</div>

<!-- Search Input -->
<div class="search-container" style="margin-bottom: 2.5rem;">
  <span class="search-icon">🔍</span>
  <input type="text" class="search-input" id="search-input" placeholder="Zoek in archief op titel, auteur of trefwoorden...">
</div>

<!-- Texts Grid -->
<div class="cards-grid" id="cards-grid">
  
  
    <div style="grid-column: 1 / -1; padding: 3rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); text-align: center;">
      <p style="color: var(--text-muted);">Nog geen teksten beschikbaar in het Nederlands.</p>
    </div>
  
</div>

<!-- Client-side filter script -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');
    const cards = document.querySelectorAll('.text-card');

    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        
        cards.forEach(card => {
          const title = card.getAttribute('data-title') || '';
          const author = card.getAttribute('data-author') || '';
          const desc = card.getAttribute('data-desc') || '';

          if (title.includes(query) || author.includes(query) || desc.includes(query)) {
            card.style.display = 'flex';
          } else {
            card.style.display = 'none';
          }
        });
      });
    }
  });
</script>

  </div>
</body>
</html>
