:root {
  --bg-primary: #0a0b0d;
  --bg-secondary: #111317;
  --bg-tertiary: #171a21;
  --accent-red: #e63939;
  --accent-red-hover: #ff4d4d;
  --accent-gold: #e5c158;
  --text-main: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --border-color: rgba(255, 255, 255, 0.05);
  --border-color-focus: rgba(230, 57, 57, 0.3);
  --font-display: 'Cinzel', serif;
  --font-sans: 'Inter', sans-serif;
  --font-serif: 'Lora', serif;
  --border-radius: 6px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Global Reset & Base Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-main);
  font-family: var(--font-sans);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Scrollbars */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: var(--bg-primary);
}
::-webkit-scrollbar-thumb {
  background: var(--bg-tertiary);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--accent-red);
}

/* Header Component */
.header {
  background: #14161c;
  padding: 1.5rem 1rem;
  text-align: center;
  border-bottom: 2px solid var(--accent-red);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.logo {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 1rem;
}

.logo-link {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--accent-red);
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-decoration: none;
  transition: var(--transition);
}

.logo-link:hover {
  color: var(--accent-red-hover);
}

.logo-img {
  height: 38px;
  width: 38px;
}

/* Language Navigation */
.lang-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem 0.75rem;
  max-width: 800px;
  margin: 0 auto;
}

.lang-link {
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  text-decoration: none;
  padding: 2px 6px;
  border-radius: 3px;
  transition: var(--transition);
}

.lang-link:hover {
  color: var(--accent-red-hover);
  background: rgba(255, 255, 255, 0.03);
}

.lang-link.active {
  color: var(--accent-gold);
  font-weight: 700;
}

.lang-sep {
  color: rgba(255, 255, 255, 0.08);
  font-size: 0.85rem;
}

/* Main Layout Grid */
.container {
  max-width: 1000px;
  width: 100%;
  margin: 2.5rem auto;
  padding: 0 1.5rem;
  flex: 1;
}

/* Titles */
h1, h2, h3 {
  font-family: var(--font-display);
  color: var(--accent-red);
  font-weight: 700;
  letter-spacing: 0.03em;
}

/* Search Bar */
.search-container {
  position: relative;
  width: 100%;
}

.search-input {
  width: 100%;
  padding: 0.8rem 1.2rem 0.8rem 2.8rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  color: var(--text-main);
  font-size: 0.95rem;
  font-family: var(--font-sans);
  transition: var(--transition);
}

.search-input:focus {
  outline: none;
  border-color: var(--border-color-focus);
  box-shadow: 0 0 0 3px rgba(230, 57, 57, 0.08);
}

.search-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
  font-size: 0.95rem;
}

/* Text Cards Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
}

.text-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  position: relative;
  transition: var(--transition);
}

.text-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
  background: var(--accent-red);
  border-radius: var(--border-radius) 0 0 var(--border-radius);
}

.text-card:hover {
  transform: translateY(-2px);
  border-color: var(--border-color-focus);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.card-title {
  font-size: 1.1rem;
  line-height: 1.4;
}

.card-title a {
  color: var(--text-main);
  text-decoration: none;
  transition: var(--transition);
}

.card-title a:hover {
  color: var(--accent-red);
}

.card-author {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent-gold);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.card-description {
  font-size: 0.85rem;
  color: var(--text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.6;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 0.8rem;
  border-top: 1px solid rgba(255, 255, 255, 0.02);
}

.card-meta-tag {
  font-size: 0.7rem;
  color: var(--text-dim);
  background: rgba(255, 255, 255, 0.02);
  padding: 2px 6px;
  border-radius: 3px;
}

.card-footer a {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent-red);
  text-decoration: none;
  letter-spacing: 0.03em;
}

.card-footer a:hover {
  color: var(--accent-red-hover);
}

/* Scholarly Text Reader Layout */
.reader-container {
  display: flex;
  gap: 2rem;
  width: 100%;
}

.reader-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.reader-sidebar {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.sidebar-widget {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: 1.25rem;
}

.sidebar-widget-title {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-gold);
  margin-bottom: 0.75rem;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 0.4rem;
}

.metadata-list {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.metadata-item {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.metadata-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  color: var(--text-dim);
  letter-spacing: 0.03em;
}

.metadata-value {
  font-size: 0.9rem;
  color: var(--text-main);
}

.pdf-viewer-frame {
  width: 100%;
  height: 70vh;
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  background: #14161a;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.6rem 1.2rem;
  font-size: 0.85rem;
  font-weight: 600;
  border-radius: var(--border-radius);
  border: none;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: var(--transition);
}

.btn-primary {
  background: var(--accent-red);
  color: #ffffff !important;
}
.btn-primary:hover {
  background: var(--accent-red-hover);
}

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-main) !important;
  border: 1px solid var(--border-color);
}
.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.03);
}

.btn-block {
  display: flex;
  width: 100%;
}

/* Admin Dashboard Panel Styling */
.admin-nav {
  display: flex;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 1.5rem;
  gap: 0.5rem;
}

.nav-tab {
  padding: 0.5rem 1rem;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  border-radius: 0;
}

.nav-tab.active {
  color: var(--accent-gold);
  border-bottom-color: var(--accent-gold);
}

.item-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-top: 1rem;
}

.list-item {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}

/* Main 2-column Layout */
.main-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 2.5rem;
  align-items: start;
}

/* Sidebar Styles */
.sidebar {
  position: sticky;
  top: 2rem;
  max-height: calc(100vh - 4rem);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  padding-right: 0.5rem;
}

.sidebar-title {
  font-family: var(--font-display);
  color: var(--accent-gold);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 0.4rem;
  font-weight: 700;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.sidebar-link {
  display: block;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.9rem;
  padding: 0.4rem 0.75rem;
  border-radius: var(--border-radius);
  transition: var(--transition);
  border-left: 2px solid transparent;
}

.sidebar-link:hover {
  color: var(--accent-red-hover);
  background: rgba(255, 255, 255, 0.02);
  border-left-color: var(--accent-red);
}

.sidebar-link.active {
  color: var(--accent-gold);
  font-weight: 600;
  background: rgba(229, 193, 88, 0.04);
  border-left-color: var(--accent-gold);
}

/* Responsive Styles & Mobile Polish */
@media (max-width: 900px) {
  .reader-container {
    flex-direction: column-reverse;
  }
  .reader-sidebar {
    width: 100%;
  }
}

@media (max-width: 768px) {
  .main-layout {
    grid-template-columns: 1fr;
    gap: 2rem;
  }
  
  .sidebar {
    position: static;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 1.5rem;
    padding-right: 0;
  }

  .header {
    padding: 1rem 0.5rem;
  }

  .logo-link {
    font-size: 1.4rem;
    gap: 8px;
  }

  .logo-img {
    height: 30px;
    width: 30px;
  }

  .lang-nav {
    gap: 0.3rem 0.5rem;
  }

  .lang-link {
    font-size: 0.75rem;
    padding: 1px 4px;
  }

  .container {
    margin: 1.5rem auto;
    padding: 0 1rem;
  }

  .cards-grid {
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  h1, h2 {
    font-size: 1.5rem;
  }
}

/* Main Content Styling (Markdown rendering for Sections and Texts) */
.main-content h1 {
  font-size: 1.9rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 0.75rem;
  color: var(--accent-red);
}

.main-content h2 {
  font-size: 1.4rem;
  margin-top: 2rem;
  margin-bottom: 1rem;
  color: var(--accent-red);
}

.main-content p {
  font-size: 1.05rem;
  color: var(--text-main);
  margin-bottom: 1.25rem;
  line-height: 1.75;
}

.main-content ul, .main-content ol {
  margin: 1.5rem 0;
  padding-left: 1.5rem;
}

.main-content li {
  font-size: 1.05rem;
  color: var(--text-main);
  margin-bottom: 0.75rem;
  line-height: 1.6;
}

.main-content a {
  color: var(--accent-gold);
  text-decoration: none;
  border-bottom: 1px dashed rgba(229, 193, 88, 0.4);
  transition: var(--transition);
}

.main-content a:hover {
  color: var(--accent-red-hover);
  border-bottom-color: var(--accent-red);
}

/* Custom list items for section lists (militant communist theme) */
.main-content ul li {
  list-style: none;
  position: relative;
  padding-left: 1.5rem;
}

.main-content ul li::before {
  content: "★";
  position: absolute;
  left: 0;
  color: var(--accent-gold);
  font-size: 0.8rem;
  top: 0.25rem;
}

  function getTranslation(lang) {
    return translations[lang] || translations.en;
  }

  function loadText() {
    if (!window.db) return;
    const urlParams = new URLSearchParams(window.location.search);
    const docId = urlParams.get('id');
    const relativePrefix = "";

    if (!docId) {
      document.getElementById('loading-text').innerText = 'Error: No document ID provided.';
      return;
    }

    window.db.collection("texts").doc(docId).get()
      .then(doc => {
        if (!doc.exists) {
          document.getElementById('loading-text').innerText = 'Error: Document not found.';
          return;
        }

        const data = doc.data();
        const lang = data.language || 'en';
        const t = getTranslation(lang);

        // Update page title
        document.title = data.title + " • Red Archive";

        // Back link
        const backLink = document.getElementById('back-link');
        backLink.href = relativePrefix + t.back_url;
        backLink.innerText = t.back;

        // Title and author
        document.getElementById('text-title').innerText = data.title;
        const authorEl = document.getElementById('text-author');
        if (data.author) {
          authorEl.innerText = data.author;
          authorEl.style.display = 'block';
        } else {
          authorEl.style.display = 'none';
        }

        // PDF iframe
        const pdfContainer = document.getElementById('pdf-container');
        if (data.pdfUrl || data.pdfName) {
          const fileUrl = data.pdfUrl || (relativePrefix + 'assets/uploads/' + data.pdfName);
          const viewerUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + encodeURIComponent(fileUrl);
          pdfContainer.innerHTML = `
            <div style="position: relative;">
              <iframe 
                src="${viewerUrl}" 
                class="pdf-viewer-frame"
                allowfullscreen>
              </iframe>
            </div>
          `;
          
          // Action buttons
          document.getElementById('btn-download').href = fileUrl;
          document.getElementById('btn-download').innerText = '📥 ' + t.download;
          document.getElementById('btn-view-full').href = fileUrl;
          document.getElementById('btn-view-full').innerText = '🔗 ' + t.fullscreen;
          document.getElementById('actions-widget').style.display = 'block';
        } else {
          pdfContainer.innerHTML = `
            <div style="padding: 3rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); text-align: center;">
              <p style="color: var(--accent-red); font-size: 1.1rem; font-weight: 500;">${t.no_pdf}</p>
            </div>
          `;
          document.getElementById('actions-widget').style.display = 'none';
        }

        // Commentary
        document.getElementById('commentary-title').innerText = t.about;
        document.getElementById('text-content').innerText = data.description || '';

        // Sidebar metadata
        document.getElementById('metadata-widget-title').innerText = t.info_title;
        document.getElementById('label-title').innerText = t.title;
        document.getElementById('meta-title').innerText = data.title;
        
        const authorRow = document.getElementById('meta-author-row');
        if (data.author) {
          document.getElementById('label-author').innerText = t.author;
          document.getElementById('meta-author').innerText = data.author;
          authorRow.style.display = 'flex';
        } else {
          authorRow.style.display = 'none';
        }

        document.getElementById('label-language').innerText = t.language;
        document.getElementById('meta-language').innerHTML = `${t.flag} ${t.lang_name}`;
        document.getElementById('label-format').innerText = t.format;
        document.getElementById('label-actions').innerText = 'Actions';

        // Toggle visibility
        document.getElementById('loading-container').style.display = 'none';
        document.getElementById('reader-container').style.display = 'grid';
      })
      .catch(err => {
        console.error("Error fetching text details:", err);
        document.getElementById('loading-text').innerText = 'Error loading document details: ' + err.message;
      });
  }

  // Bind execution
  if (window.firebaseReady) {
    loadText();
  } else {
    window.addEventListener('firebase-ready', loadText);
  }
</script>

    <p style="font-family: var(--font-display); font-size: 1.1rem; color: var(--accent-gold); margin-bottom: 0.75rem; letter-spacing: 0.05em;">Proletarians of all countries, unite!</p>
    <a href="../admin/index.html" style="color: var(--accent-red); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.4rem; transition: var(--transition);" onmouseover="this.style.color='var(--accent-red-hover)'" onmouseout="this.style.color='var(--accent-red)'">
      ⚙️ Maintenance Panel

  <script>
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function hydrateSidebar() {
      if (!window.db) return;
      const currentLang = "en";
      const relativePrefix = "../";
      const sidebarTitle = "Thematic Sections";
      
      window.db.collection("sections")
        .where("language", "==", currentLang)
        .orderBy("order")
        .get()
        .then(snapshot => {
          const sections = [];
          snapshot.forEach(doc => {
            sections.push({ id: doc.id, ...doc.data() });
          });
          
          if (sections.length === 0) return;
          
          const container = document.getElementById('sidebar-sections-container');
          if (!container) return;
          
          const urlParams = new URLSearchParams(window.location.search);
          const currentId = urlParams.get('id');
          const isSectionView = window.location.pathname.includes('/sections/view.html');
          
          let html = `<div class="sidebar-title" style="margin-top: 1.5rem;">${sidebarTitle}</div>`;
          sections.forEach(s => {
            const is_active = isSectionView && currentId === s.id;
            const linkUrl = `${relativePrefix}sections/view.html?id=${s.id}`;
            html += `<a href="${linkUrl}" class="sidebar-link ${is_active ? 'active' : ''}">${escapeHtml(s.title)}</a>`;
          });
          container.innerHTML = html;
        })
        .catch(err => {
          console.warn("Failed to load sections from Firestore:", err);
        });
    }

    function hydrateHomepageTexts() {
      if (!window.db) return;
      const currentLang = "en";
      const relativePrefix = "../";
      
      const grid = document.getElementById('cards-grid');
      if (!grid) return;
      
      window.db.collection("texts")
        .where("language", "==", currentLang)
        .get()
        .then(snapshot => {
          const texts = [];
          snapshot.forEach(doc => {
            texts.push({ id: doc.id, ...doc.data() });
          });
          
          // Sort alphabetically by title
          texts.sort((a, b) => a.title.localeCompare(b.title));
          
          if (texts.length === 0) {
            let msg = "No texts available in English yet.";
            if (currentLang === 'pt') msg = "Nenhum texto disponível em português ainda.";
            if (currentLang === 'es') msg = "Ningún texto disponible en español aún.";
            if (currentLang === 'it') msg = "Nessun testo disponibile in italiano ancora.";
            if (currentLang === 'nl') msg = "Nog geen teksten beschikbaar in het Nederlands.";
            if (currentLang === 'de') msg = "Keine Texte auf Deutsch verfügbar.";
            if (currentLang === 'el') msg = "Δεν υπάρχουν ακόμη διαθέσιμα κείμενα στα ελληνικά.";
            
            grid.innerHTML = `
              <div style="grid-column: 1 / -1; padding: 3rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); text-align: center;">
                <p style="color: var(--text-muted);">${msg}</p>
              </div>
            `;
            return;
          }
          
          let flagAndName = "🇬🇧 English";
          let readLabel = "READ TEXT";
          if (currentLang === 'pt') { flagAndName = "🇧🇷 Português"; readLabel = "LER TEXTO"; }
          if (currentLang === 'es') { flagAndName = "🇪🇸 Español"; readLabel = "LEER TEXTO"; }
          if (currentLang === 'it') { flagAndName = "🇮🇹 Italiano"; readLabel = "LEGGI IL TESTO"; }
          if (currentLang === 'nl') { flagAndName = "🇳🇱 Nederlands"; readLabel = "LEES TEKST"; }
          if (currentLang === 'de') { flagAndName = "🇩🇪 Deutsch"; readLabel = "TEXT LESEN"; }
          if (currentLang === 'el') { flagAndName = "🇬🇷 Ελληνικά"; readLabel = "ΑΝΑΓΝΩΣΗ ΚΕΙΜΕΝΟΥ"; }
          
          grid.innerHTML = "";
          texts.forEach(text => {
            const card = document.createElement('div');
            card.className = 'text-card';
            card.setAttribute('data-title', text.title.toLowerCase());
            card.setAttribute('data-author', (text.author || '').toLowerCase());
            card.setAttribute('data-desc', (text.description || '').toLowerCase());
            
            const viewUrl = `${relativePrefix}texts/view.html?id=${text.id}`;
            const authorHtml = text.author ? `<span class="card-author">${escapeHtml(text.author)}</span>` : '';
            const descHtml = text.description ? `<p class="card-description">${escapeHtml(text.description)}</p>` : '';
            
            card.innerHTML = `
              <div class="card-header">
                <h3 class="card-title" style="font-family: var(--font-serif);">
                  <a href="${viewUrl}">${escapeHtml(text.title)}</a>
                </h3>
              </div>
              ${authorHtml}
              ${descHtml}
              <div class="card-footer">
                <span class="card-meta-tag">${flagAndName}</span>
                <a href="${viewUrl}" style="font-weight: 600; font-size: 0.85rem; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 0.25rem;">
                  ${readLabel} <span style="font-size: 1.1rem; line-height: 1;">→</span>
                </a>
              </div>
            `;
            grid.appendChild(card);
          });
          
          // Re-apply search filter
          const searchInput = document.getElementById('global-search');
          if (searchInput && searchInput.value) {
            filterCards(searchInput.value.toLowerCase().trim());
          }
        })
        .catch(err => {
          console.warn("Failed to load texts from Firestore:", err);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('global-search');
      const pageUrl = "/texts/view.html";
      const isHomepage = pageUrl === "/" || pageUrl === "/index.html" || pageUrl === "/pt/index.html" || pageUrl === "/es/index.html" || pageUrl === "/it/index.html" || pageUrl === "/nl/index.html" || pageUrl === "/de/index.html" || pageUrl === "/el/index.html";

      function filterCards(query) {
        const cards = document.querySelectorAll('.text-card');
        cards.forEach(card => {
          const title = card.getAttribute('data-title') || '';
          const author = card.getAttribute('data-author') || '';
          const desc = card.getAttribute('data-desc') || '';
          if (title.includes(query) || author.includes(query) || desc.includes(query)) {
            card.style.display = 'flex';
          } else {
            card.style.display = 'none';
          }
        });
      }

      if (searchInput) {
        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('q');
        if (queryParam) {
          searchInput.value = queryParam;
          if (isHomepage) {
            filterCards(queryParam.toLowerCase().trim());
          }
        }

        searchInput.addEventListener('input', (e) => {
          const query = e.target.value;
          if (isHomepage) {
            filterCards(query.toLowerCase().trim());
          }
        });

        searchInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            const query = e.target.value.trim();
            if (!isHomepage) {
              const homeUrl = "../index.html?q=" + encodeURIComponent(query);
              window.location.href = homeUrl;
            }
          }
        });
      }

      function onFirebaseReady() {
        hydrateSidebar();
        if (isHomepage) hydrateHomepageTexts();
      }

      if (window.firebaseReady) {
        onFirebaseReady();
      } else {
        window.addEventListener('firebase-ready', onFirebaseReady);
      }
    });
  </script>
