title: Red Alcoholic Archive
description: Official shared library for the Red Alcoholic Discord server

baseurl: "/IntComLibrary"
url: "https://intcomden.github.io"

collections:
  texts:
    output: true
    # Removed the problematic permalink line to stop the error

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .nojekyll
