<!DOCTYPE html>
<html lang="{{ page.language | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} • Internationalist Communist Library</title>
  
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <a href="{{ site.baseurl }}/" class="logo-link">
        <img src="{{ site.baseurl }}/assets/logo.svg" alt="☭" class="logo-img">
        <span>Internationalist Communist Library</span>
      </a>
    </div>
    <div class="nav-container">
      {% include nav.html %}
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>
</body>
</html>
