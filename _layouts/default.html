<!DOCTYPE html>
<html lang="{{ page.language | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} • Internationalist Communist Library</title>
  
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">

  <!-- Support for custom search, cards, and admin dashboard styling -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

  <!-- Cleaned-up style overrides provided by the user -->
  <style>
    :root {
      --bg: #0c0d10;
      --card: #14161d;
      --red: #e63939;
      --gold: #e5c158;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg) !important;
      color: var(--text) !important;
      line-height: 1.7;
    }
    .header {
      background: #1a1c24 !important;
      padding: 1.5rem !important;
      text-align: center !important;
      border-bottom: 3px solid var(--red) !important;
      height: auto !important;
      display: block !important;
    }
    .logo {
      font-size: 2.2rem !important;
      font-weight: bold !important;
      color: var(--red) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 12px !important;
    }
    .container {
      max-width: 1100px !important;
      margin: 2rem auto !important;
      padding: 0 1.5rem !important;
    }
    .card {
      background: var(--card) !important;
      border-left: 5px solid var(--red) !important;
      padding: 1.5rem !important;
      margin-bottom: 1.5rem !important;
      border-radius: 4px !important;
    }
    h1, h2 { color: var(--red) !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="{{ site.baseurl }}/assets/logo.svg" alt="☭" style="height: 48px; width: 48px; vertical-align: middle;">
      Internationalist Communist Library
    </div>
  </div>

  <div class="container">
    {{ content }}
  </div>
</body>
</html>
