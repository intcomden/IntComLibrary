---
layout: default
title: View Section
---

<div class="section-container" id="section-container" style="display: none; max-width: 800px; margin: 0 auto; padding: 2rem 1rem">
  <header style="margin-bottom: 2.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem">
    <h2 id="section-title" style="font-size: 2rem; margin-bottom: 0.5rem"></h2>
  </header>
  <div id="section-content" class="markdown-body" style=" font-size: 1.1rem; line-height: 1.8; color: var(--text-main)">
    <!-- Marked renders list here -->
  </div>
</div>

<div id="loading-container" style="padding: 5rem; text-align: center; color: var(--text-muted)">
  <p style="font-size: 1.2rem" id="loading-text">Loading section...</p>
</div>

<!-- Load Marked.js for dynamic markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  function loadSection() {
    if (!window.db) return;
    const urlParams = new URLSearchParams(window.location.search);
    const docId = urlParams.get('id');

    if (!docId) {
      document.getElementById('loading-text').innerText = 'Error: No section ID provided.';
      return;
    }

    window.db.collection("sections").doc(docId).get()
      .then(doc => {
        if (!doc.exists) {
          document.getElementById('loading-text').innerText = 'Error: Section not found.';
          return;
        }

        const data = doc.data();

        // Update page title
        document.title = data.title + " • Red Archive";

        // Update elements
        document.getElementById('section-title').innerText = data.title;
        
        // Parse section list markdown content
        const rawContent = data.content || '';
        document.getElementById('section-content').innerHTML = marked.parse(rawContent);

        // Toggle visibility
        document.getElementById('loading-container').style.display = 'none';
        document.getElementById('section-container').style.display = 'block';
      })
      .catch(err => {
        console.error("Error fetching section details:", err);
        document.getElementById('loading-text').innerText = 'Error loading section details: ' + err.message;
      });
  }

  // Bind execution
  if (window.firebaseReady) {
    loadSection();
  } else {
    window.addEventListener('firebase-ready', loadSection);
  }
</script>
