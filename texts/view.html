---
layout: default
title: Loading Text...
---

<div class="reader-container" id="reader-container" style="display: none">
  <!-- Main content area (Viewer + Info) -->
  <div class="reader-main">
    <nav class="language-nav" style="justify-content: flex-start; margin-bottom: 1rem">
      <a id="back-link" href="#" style="font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem">
        <!-- Filled by JS -->
      </a>
    </nav>

    <header style="margin-bottom: 2rem">
      <h1 id="text-title" style="font-size: 2.2rem; line-height: 1.2; margin-bottom: 0.5rem"></h1>
      <p id="text-author" style="font-family: var(--font-display); color: var(--accent-gold); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em"></p>
    </header>

    <div id="pdf-container">
      <!-- Filled by JS -->
    </div>

    <!-- Text Description / Commentary (Rendered underneath PDF) -->
    <section class="sidebar-widget" style="background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 2rem; margin-top: 1.5rem">
      <h2 id="commentary-title" style="font-size: 1.25rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-gold); border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1rem">
        <!-- Filled by JS -->
      </h2>
      <div id="text-content" style=" font-size: 1.05rem; line-height: 1.8; color: var(--text-main); white-space: pre-wrap">
        <!-- Filled by JS -->
      </div>
    </section>
  </div>

  <!-- Sidebar widget area (Metadata + Download Actions) -->
  <aside class="reader-sidebar">
    <div class="sidebar-widget">
      <h3 class="sidebar-widget-title" id="metadata-widget-title">Document Details</h3>
      <div class="metadata-list">
        <div class="metadata-item">
          <span class="metadata-label" id="label-title">Title</span>
          <span class="metadata-value" id="meta-title" style="font-weight: 600"></span>
        </div>
        
        <div class="metadata-item" id="meta-author-row">
          <span class="metadata-label" id="label-author">Author</span>
          <span class="metadata-value" id="meta-author"></span>
        </div>

        <div class="metadata-item">
          <span class="metadata-label" id="label-language">Language</span>
          <span class="metadata-value" id="meta-language" style="display: flex; align-items: center; gap: 0.4rem"></span>
        </div>

        <div class="metadata-item">
          <span class="metadata-label" id="label-format">Format</span>
          <span class="metadata-value" style="font-family: monospace; font-size: 0.85rem">PDF Document (.pdf)</span>
        </div>
      </div>
    </div>

    <div class="sidebar-widget" id="actions-widget" style="border-color: rgba(214, 48, 49, 0.3); display: none">
      <h3 class="sidebar-widget-title" id="label-actions" style="color: var(--accent-red)">Actions</h3>
      <div style="display: flex; flex-direction: column; gap: 0.75rem">
        <a id="btn-download" href="#" download class="btn btn-primary btn-block">
          <!-- Filled by JS -->
        </a>
        <a id="btn-view-full" href="#" target="_blank" class="btn btn-secondary btn-block">
          <!-- Filled by JS -->
        </a>
      </div>
    </div>
  </aside>
</div>

<div id="loading-container" style="padding: 5rem; text-align: center; color: var(--text-muted)">
  <p style="font-size: 1.2rem" id="loading-text">Loading document...</p>
</div>

<script>

    },
    es: {

      back_url: 'es/index.html',

      author: 'Autor',
      language: 'Idioma',
      format: 'Formato',

    },
    it: {

      title: 'Titolo',
      author: 'Autore',
      language: 'Lingua',
      format: 'Formato',
      download: 'Scarica il PDF',
      fullscreen: 'Schermo Intero',
      about: 'Informazioni su questo Testo',
      no_pdf: 'Nessun file PDF allegato a questa voce.',
      flag: '🇮🇹',
      lang_name: 'Italiano'
    },
    nl: {
      back: '← Terug naar de Bibliotheek',
      back_url: 'nl/index.html',
      info_title: 'Document Details',
      title: 'Titel',
      author: 'Auteur',
      language: 'Taal',
      format: 'Formaat',
      download: 'PDF downloaden',
      fullscreen: 'Volledig Scherm',
      about: 'Over deze Tekst',
      no_pdf: 'Geen PDF-bestand gekoppeld aan dit item.',
      flag: '🇳🇱',
      lang_name: 'Nederlands'
    },
    de: {
      back: '← Zurück zur Bibliothek',
      back_url: 'de/index.html',
      info_title: 'Textdetails',
      title: 'Titel',
      author: 'Autor',
      language: 'Sprache',
      format: 'Format',
      download: 'PDF herunterladen',
      fullscreen: 'Vollbild',

      no_pdf: 'Diesem Eintrag ist keine PDF-Datei beigefügt.',
      flag: '🇩🇪',

    },
    el: {
      back: '← Επιστροφή στη Βιβλιοθήκη',
      back_url: 'el/index.html',
      info_title: 'Λεπτομέρειες Κειμένου',
      title: 'Τίτλος',
      author: 'Συγγραφέας',
      language: 'Γλώσσα',
      format: 'Μορφή',

      flag: '🇬🇷',

    },
    en: {
      back: '← Back to Library',
      back_url: 'index.html',
      info_title: 'Document Details',
      title: 'Title',
      author: 'Author',
      language: 'Language',
      format: 'Format',
      download: 'Download PDF',
      fullscreen: 'Full Screen',
      about: 'About this Text',
      no_pdf: 'No PDF file attached to this entry.',
      flag: '🇬🇧',
      lang_name: 'English'
    }
  };

  function getTranslation(lang) {
    return translations[lang] || translations.en;
  }

  function loadText() {
    if (!window.db) return;
    const urlParams = new URLSearchParams(window.location.search);
    const docId = urlParams.get('id');
    const relativePrefix = "{{ relative_prefix }}";

    if (!docId) {
      document.getElementById('loading-text').innerText = 'Error: No document ID provided.';
      return;
    }

    window.db.collection("texts").doc(docId).get()
      .then(doc => {
        if (!doc.exists) {
          document.getElementById('loading-text').innerText = 'Error: Document not found.';
          return;
        }

        const data = doc.data();
        const lang = data.language || 'en';
        const t = getTranslation(lang);

        // Update page title
        document.title = data.title + " • Red Archive";

        // Back link
        const backLink = document.getElementById('back-link');
        backLink.href = relativePrefix + t.back_url;
        backLink.innerText = t.back;

        // Title and author
        document.getElementById('text-title').innerText = data.title;
        const authorEl = document.getElementById('text-author');
        if (data.author) {
          authorEl.innerText = data.author;
          authorEl.style.display = 'block';
        } else {
          authorEl.style.display = 'none';
        }

        // PDF iframe
        const pdfContainer = document.getElementById('pdf-container');
        if (data.pdfUrl || data.pdfName) {
          const fileUrl = data.pdfUrl || (relativePrefix + 'assets/uploads/' + data.pdfName);
          const viewerUrl = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + encodeURIComponent(fileUrl);
          pdfContainer.innerHTML = `
            <div style="position: relative">
              <iframe 
                src="${viewerUrl}" 
                class="pdf-viewer-frame"
                allowfullscreen>
              </iframe>
            </div>
          `;
          
          // Action buttons
          document.getElementById('btn-download').href = fileUrl;
          document.getElementById('btn-download').innerText = '📥 ' + t.download;
          document.getElementById('btn-view-full').href = fileUrl;
          document.getElementById('btn-view-full').innerText = '🔗 ' + t.fullscreen;
          document.getElementById('actions-widget').style.display = 'block';
        } else {
          pdfContainer.innerHTML = `
            <div style="padding: 3rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); text-align: center">
              <p style="color: var(--accent-red); font-size: 1.1rem; font-weight: 500">${t.no_pdf}</p>
            </div>
          `;
          document.getElementById('actions-widget').style.display = 'none';
        }

        // Commentary
        document.getElementById('commentary-title').innerText = t.about;
        document.getElementById('text-content').innerText = data.description || '';

        // Sidebar metadata
        document.getElementById('metadata-widget-title').innerText = t.info_title;
        document.getElementById('label-title').innerText = t.title;
        document.getElementById('meta-title').innerText = data.title;
        
        const authorRow = document.getElementById('meta-author-row');
        if (data.author) {
          document.getElementById('label-author').innerText = t.author;
          document.getElementById('meta-author').innerText = data.author;
          authorRow.style.display = 'flex';
        } else {
          authorRow.style.display = 'none';
        }

        document.getElementById('label-language').innerText = t.language;
        document.getElementById('meta-language').innerHTML = `${t.flag} ${t.lang_name}`;
        document.getElementById('label-format').innerText = t.format;
        document.getElementById('label-actions').innerText = 'Actions';

        // Toggle visibility
        document.getElementById('loading-container').style.display = 'none';
        document.getElementById('reader-container').style.display = 'grid';
      })
      .catch(err => {
        console.error("Error fetching text details:", err);
        document.getElementById('loading-text').innerText = 'Error loading document details: ' + err.message;
      });
  }

  // Bind execution
  if (window.firebaseReady) {
    loadText();
  } else {
    window.addEventListener('firebase-ready', loadText);
  }
</script>
